const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const dayName = (d = new Date()) => DAY_NAMES[d.getDay()];
const formatTime = (s) => {
  if (s < 0) s = 0;
  const m = Math.floor(s/60), sec = s%60;
  return `${m}:${String(sec).padStart(2,'0')}`;
};

const KEY = 'forge.v1.';
const store = {
  get(k, def = null) {
    try { const v = localStorage.getItem(KEY + k); return v ? JSON.parse(v) : def; }
    catch { return def; }
  },
  set(k, v) {
    try { localStorage.setItem(KEY + k, JSON.stringify(v)); return true; }
    catch { return false; }
  },
  del(k) { try { localStorage.removeItem(KEY + k); } catch {} },
  listKeys(prefix) {
    const out = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(KEY + prefix)) out.push(k.slice(KEY.length));
    }
    return out;
  },
};

/* ----- Set Row ----- */
const SetRow = ({ setIdx, set, last, exercise, onComplete }) => {
  const [editing, setEditing] = useState(!set.done);
  const [weight, setWeight] = useState(set.weight ?? (last?.weight ?? ''));
  const [reps, setReps] = useState(set.reps ?? (last?.reps ?? ''));

  useEffect(() => {
    if (!set.done) {
      setWeight(set.weight ?? (last?.weight ?? ''));
      setReps(set.reps ?? (last?.reps ?? ''));
    }
  }, [exercise.name, setIdx]);

  const confirm = () => {
    const w = weight === '' ? null : parseFloat(weight);
    const r = reps === '' ? null : parseInt(reps, 10);
    if (r === null || isNaN(r)) return;
    onComplete(setIdx, { weight: isNaN(w) ? null : w, reps: r, done: true });
    setEditing(false);
  };

  if (set.done && !editing) {
    return html`
      <div onClick=${() => setEditing(true)} style=${{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:10, background:'var(--cardHi)', border:'1px solid rgba(125,212,154,0.3)', cursor:'pointer' }}>
        <div style=${{ width:26, height:26, borderRadius:'50%', background:'rgba(125,212,154,0.15)', display:'flex', alignItems:'center', justifyContent:'center' }}>

        </div>
        <div style=${{ flex:1, display:'flex', alignItems:'baseline', gap:12 }}>
          <span style=${{ color:'var(--muted)', fontSize:11, fontWeight:600, letterSpacing:'0.08em' }}>SET ${setIdx + 1}</span>
          <span class="mono" style=${{ fontSize:16, fontWeight:600 }}>
            ${set.weight !== null && set.weight !== undefined ? `${set.weight}kg × ` : ''}${set.reps}
          </span>
        </div>
        <${I.chevR} size=${14} color="var(--dim)"/>
      </div>
    `;
  }

  return html`
    <div style=${{ padding:12, borderRadius:10, background:'var(--cardHi)', border:'1px solid var(--borderHi)' }}>
      <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
        <span style=${{ color:'var(--accent)', fontSize:11, fontWeight:700, letterSpacing:'0.1em' }}>SET ${setIdx + 1}</span>
        ${last && html`
          <span class="mono" style=${{ fontSize:11, color:'var(--dim)' }}>
            last: ${last.weight ? `${last.weight}kg × ` : ''}${last.reps ?? '—'}
          </span>
        `}
      </div>
      <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr auto', gap:8, alignItems:'center' }}>
        <div>
          <label style=${inputLabel}>WEIGHT (kg)</label>
          <input type="number" inputMode="decimal" value=${weight}
            onInput=${(e) => setWeight(e.target.value)}
            placeholder=${exercise.bodyweight ? 'BW' : '0'} style=${numInput} />
        </div>
        <div>
          <label style=${inputLabel}>REPS</label>
          <input type="number" inputMode="numeric" value=${reps}
            onInput=${(e) => setReps(e.target.value)}
            placeholder="0" style=${numInput} />
        </div>
        <button onClick=${confirm} style=${{ ...btnP(46), width:46, padding:0, marginTop:14 }}>
          <${I.check} size=${18} sw=${2.5}/>
        </button>
      </div>
    </div>
  `;
};

/* ----- Body View ----- */
const BodyView = ({ weighIns, onAdd, onBack }) => {
  const [kg, setKg] = useState('');
  const [bf, setBf] = useState('');
  const data = [...weighIns].sort((a,b) => a.date.localeCompare(b.date)).slice(-30);
  const min = data.length ? Math.min(...data.map(d => d.kg)) : 0;
  const max = data.length ? Math.max(...data.map(d => d.kg)) : 0;
  const range = Math.max(1, max - min);
  const latest = data[data.length - 1];
  const first = data[0];
  const change = latest && first ? (latest.kg - first.kg) : 0;

  const add = () => {
    const k = parseFloat(kg);
    if (isNaN(k)) return;
    const b = bf === '' ? null : parseFloat(bf);
    onAdd({ kg: k, bf: isNaN(b) ? null : b, date: todayKey() });
    setKg(''); setBf('');
  };

  return html`
    <div style=${{ paddingBottom:100 }}>
      <div style=${topBar}>
        <button onClick=${onBack} style=${btnG()}><${I.chevL} size=${20}/></button>
        <div style=${{ flex:1, textAlign:'center' }}>
          <div class="anton" style=${{ fontSize:18 }}>BODY</div>
        </div>
        <div style=${{ width:36 }}/>
      </div>
      <div style=${{ padding:'0 16px' }}>
        <div style=${{ padding:16, borderRadius:14, background:'linear-gradient(135deg, var(--bg2), var(--card))', border:'1px solid var(--border)', marginBottom:14 }}>
          <div style=${{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
            <div>
              <div style=${{ color:'var(--muted)', fontSize:10, fontWeight:700, letterSpacing:'0.1em' }}>CURRENT</div>
              <div class="anton" style=${{ fontSize:44, lineHeight:1 }}>
                ${latest ? latest.kg.toFixed(1) : '—'}<span style=${{ fontSize:18, color:'var(--muted)', marginLeft:4 }}>kg</span>
              </div>
              ${latest?.bf && html`<div class="mono" style=${{ color:'var(--dim)', fontSize:12, marginTop:4 }}>${latest.bf}% BF</div>`}
            </div>
            <div style=${{ textAlign:'right' }}>
              <div style=${{ color:'var(--muted)', fontSize:10, fontWeight:700, letterSpacing:'0.1em' }}>CHANGE</div>
              <div class="anton" style=${{ fontSize:24, lineHeight:1.2, color: change < 0 ? 'var(--success)' : change > 0 ? 'var(--warn)' : 'var(--text)' }}>
                ${change >= 0 ? '+' : ''}${change.toFixed(1)}<span style=${{ fontSize:12, color:'var(--muted)', marginLeft:2 }}>kg</span>
              </div>
            </div>
          </div>
          ${data.length > 1 && html`
            <div style=${{ marginTop:16, height:60 }}>
              <svg width="100%" height="60" viewBox=${`0 0 ${data.length * 10} 60`} preserveAspectRatio="none" style=${{ width:'100%', height:60 }}>
                <polyline points=${data.map((d,i) => `${i*10},${60 - ((d.kg - min) / range) * 50 - 5}`).join(' ')} fill="none" stroke="var(--accent)" stroke-width="1.5"/>
                ${data.map((d,i) => html`<circle cx=${i*10} cy=${60 - ((d.kg - min) / range) * 50 - 5} r="2" fill="var(--accent)"/>`)}
              </svg>
            </div>
          `}
        </div>

        <div style=${{ padding:14, borderRadius:12, background:'var(--card)', border:'1px solid var(--border)', marginBottom:14 }}>
          <div style=${{ color:'var(--muted)', fontSize:11, fontWeight:700, letterSpacing:'0.1em', marginBottom:10 }}>LOG WEIGH-IN · ${todayKey()}</div>
          <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr auto', gap:8, alignItems:'end' }}>
            <div>
              <label style=${inputLabel}>WEIGHT (kg)</label>
              <input type="number" inputMode="decimal" value=${kg} onInput=${(e) => setKg(e.target.value)} placeholder="88.0" style=${numInput}/>
            </div>
            <div>
              <label style=${inputLabel}>BF % (opt)</label>
              <input type="number" inputMode="decimal" value=${bf} onInput=${(e) => setBf(e.target.value)} placeholder="19" style=${numInput}/>
            </div>
            <button onClick=${add} style=${{ ...btnP(46), width:46, padding:0 }}><${I.plus} size=${18} sw=${2.5}/></button>
          </div>
        </div>

        <div style=${{ fontSize:11, color:'var(--muted)', fontWeight:700, letterSpacing:'0.1em', padding:'0 4px 8px' }}>RECENT · ${data.length} ENTRIES</div>
        <div style=${{ display:'flex', flexDirection:'column', gap:6 }}>
          ${[...data].reverse().slice(0, 10).map((d) => html`
            <div key=${d.date} style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 14px', borderRadius:10, background:'var(--card)', border:'1px solid var(--border)' }}>
              <span class="mono" style=${{ color:'var(--muted)', fontSize:12 }}>${d.date}</span>
              <span class="mono" style=${{ fontSize:14, fontWeight:600 }}>${d.kg.toFixed(1)} kg${d.bf ? ` · ${d.bf}%` : ''}</span>
            </div>

        </div>
      </div>
    </div>
  `;
};

const StartingWeightsView = ({ startingWeights, onUpdate, onBack }) => {
  const days = ['Mon','Wed','Thu','Fri'];

    const cfg = PROGRAM[day]; if (cfg.type !== 'lift') return null;

  const filled = Object.values(startingWeights).filter((v) => v != null).length;

            <div style=${{ color:'var(--muted)', fontSize:10, fontWeight:700, letterSpacing:'0.1em' }}>BODYWEIGHT</div>
            <div class="anton" style=${{ fontSize:22, lineHeight:1 }}>${lastWeight ? lastWeight.toFixed(1) : '—'}<span style=${{ fontSize:12, color:'var(--muted)', marginLeft:3 }}>kg</span></div>
          </button>
          <button onClick=${() => onNav('history')} style=${statCard()}>
            <${I.history} size=${16} color="var(--accent)"/>
            <div style=${{ color:'var(--muted)', fontSize:10, fontWeight:700, letterSpacing:'0.1em' }}>HISTORY</div>
            <div class="anton" style=${{ fontSize:22, lineHeight:1 }}>View</div>
          </button>
        </div>

        <div style=${{ color:'var(--muted)', fontSize:11, fontWeight:700, letterSpacing:'0.1em', marginBottom:8, padding:'0 4px' }}>THE WEEK</div>
        <div style=${{ display:'flex', flexDirection:'column', gap:6 }}>
          ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d) => {
            const s = PROGRAM[d];
            const isToday = d === dn;
            return html`
              <button key=${d} onClick=${() => onPickDay(d)} style=${{ display:'flex', alignItems:'center', gap:12, padding:'12px 14px', background: isToday ? 'rgba(229,138,90,0.08)' : 'var(--card)', border:`1px solid ${isToday ? 'rgba(229,138,90,0.4)' : 'var(--border)'}`, borderRadius:10, textAlign:'left' }}>
                <div class="anton" style=${{ width:28, height:28, borderRadius:6, background:'var(--bg)', border:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, color: isToday ? 'var(--accent)' : 'var(--muted)' }}>${d.toUpperCase()}</div>
                <div style=${{ flex:1 }}>
                  <div style=${{ fontSize:13, fontWeight:600 }}>${s.name}</div>
                  <div style=${{ fontSize:11, color:'var(--muted)' }}>${s.subtitle}</div>
                </div>
                ${s.icon === 'wind' ? html`<${I.wind} size=${14} color=${isToday ? 'var(--accent)' : 'var(--dim)'}/>` :
                  s.icon === 'moon' ? html`<${I.moon} size=${14} color=${isToday ? 'var(--accent)' : 'var(--dim)'}/>` :
                  html`<${I.flame} size=${14} color=${isToday ? 'var(--accent)' : 'var(--dim)'}/>`}
              </button>
            `;
          })}
        </div>
      </div>
    </div>
  `;
};
const statCard = () => ({
  padding:14, borderRadius:12, background:'var(--card)', border:'1px solid var(--border)',
  textAlign:'left', display:'flex', flexDirection:'column', alignItems:'flex-start', gap:6,
});

/* ===========================================================
   ROOT APP
   =========================================================== */
function App() {
  const [view, setView] = useState('home');
  const [currentSession, setCurrentSession] = useState(null);
  const [history, setHistory] = useState([]);
  const [weighIns, setWeighIns] = useState([]);
  const [startingWeights, setStartingWeights] = useState({});
  const [restActive, setRestActive] = useState(false);
  const [restRemaining, setRestRemaining] = useState(0);
  const [restTotal, setRestTotal] = useState(0);
  const restEndRef = useRef(0);
  const tickRef = useRef(null);
  const beepFiredRef = useRef(false);

  // Load on mount
  useEffect(() => {
    const sessionKeys = store.listKeys('session:');
    const sessions = sessionKeys.map((k) => store.get(k)).filter(Boolean);
    sessions.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    setHistory(sessions);
    setWeighIns(store.get('weighIns', []));
    setStartingWeights(store.get('startingWeights', {}));
  }, []);

  // Rest timer driven by timestamp so it survives tab visibility throttling
  useEffect(() => {
    if (!restActive) {
      clearInterval(tickRef.current);
      return;
    }
    const tick = () => {
      const remaining = Math.max(0, Math.ceil((restEndRef.current - Date.now()) / 1000));
      setRestRemaining(remaining);
      if (remaining === 0 && !beepFiredRef.current) {
        beepFiredRef.current = true;
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 880;
          gain.gain.setValueAtTime(0.001, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
          osc.start();
          osc.stop(ctx.currentTime + 0.5);
        } catch {}
        if (navigator.vibrate) navigator.vibrate([220, 100, 220]);
        if ('Notification' in window && Notification.permission === 'granted') {
          try { new Notification('FORGE', { body: 'Rest complete — next set', tag: 'forge-rest' }); } catch {}
        }
        setTimeout(() => setRestActive(false), 800);
      }
    };
    tick();
    tickRef.current = setInterval(tick, 250);
    return () => clearInterval(tickRef.current);
  }, [restActive]);

  // Recalculate timer on visibility change (catches up after backgrounding)
  useEffect(() => {
    const handler = () => {
      if (restActive && !document.hidden) {
        const remaining = Math.max(0, Math.ceil((restEndRef.current - Date.now()) / 1000));
        setRestRemaining(remaining);
      }
    };
    document.addEventListener('visibilitychange', handler);
    return () => document.removeEventListener('visibilitychange', handler);
  }, [restActive]);

  const dn = dayName();
  const todaysSession = { ...PROGRAM[dn], day: dn };

  const ensureSession = (day) => {
    const cfg = PROGRAM[day];
    if (cfg.type === 'lift') {
      return {
        date: todayKey(), day, name: cfg.name, subtitle: cfg.subtitle, type: 'lift',
        exercises: cfg.exercises,
        sessionData: cfg.exercises.map((e) => ({ name: e.name, sets: Array.from({length: e.sets}).map(() => ({})) })),
      };
    }
    if (cfg.type === 'run') {
      return { date: todayKey(), day, name: cfg.name, subtitle: cfg.subtitle, type: 'run', runType: cfg.runType };
    }
    return { date: todayKey(), day, name: cfg.name, subtitle: cfg.subtitle, type: 'rest' };
  };

  const startSession = (day = dn) => {
    const cfg = PROGRAM[day];
    if (cfg.type === 'rest') return;
    const existing = store.get(`session:${todayKey()}:${day}`);
    setCurrentSession(existing || ensureSession(day));
    setView(cfg.type === 'lift' ? 'workout' : 'run');
    // Request notification permission lazily on first session start
    if ('Notification' in window && Notification.permission === 'default') {
      try { Notification.requestPermission(); } catch {}
    }
  };

  const saveCurrentSession = useCallback((s) => {
    if (!s) return;
    store.set(`session:${s.date}:${s.day}`, s);
    setHistory((prev) => {
      const filtered = prev.filter((p) => !(p.date === s.date && p.day === s.day));
      const next = [s, ...filtered];
      next.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      return next;
    });
  }, []);

  const handleSetComplete = (exIdx, setIdx, data) => {
    setCurrentSession((prev) => {
      if (!prev) return prev;
      const copy = { ...prev, sessionData: prev.sessionData.map((e, i) =>
        i === exIdx ? { ...e, sets: e.sets.map((s, j) => j === setIdx ? data : s) } : e
      )};
      saveCurrentSession(copy);
      const restSec = prev.exercises[exIdx]?.rest ?? 90;
      restEndRef.current = Date.now() + restSec * 1000;
      beepFiredRef.current = false;
      setRestTotal(restSec);
      setRestRemaining(restSec);
      setRestActive(true);
      return copy;
    });
  };

  const lastSessionFor = (day) => {
    const today = todayKey();
    return history.find((s) => s.day === day && s.date !== today && s.type === 'lift');
  };

  const finishWorkout = () => {
    if (currentSession) saveCurrentSession(currentSession);
    setView('home');
    setCurrentSession(null);
    setRestActive(false);
  };

  const handleRunSave = (data) => {
    const s = { ...currentSession, ...data, saved: true };
    saveCurrentSession(s);
    setView('home');
    setCurrentSession(null);
  };

  const addWeighIn = (entry) => {
    const next = [...weighIns.filter((w) => w.date !== entry.date), entry];
    setWeighIns(next);
    store.set('weighIns', next);
  };

  const updateStartingWeight = (name, w) => {
    const next = { ...startingWeights };
    if (w == null) delete next[name]; else next[name] = w;
    setStartingWeights(next);
    store.set('startingWeights', next);
  };

  const resetAll = () => {
    if (!confirm('Delete all sessions, weigh-ins and starting weights? Cannot be undone.')) return;
    for (const k of store.listKeys('')) store.del(k);
    setHistory([]); setWeighIns([]); setStartingWeights({});
  };

  const latestWeight = weighIns.length ? [...weighIns].sort((a,b) => b.date.localeCompare(a.date))[0]?.kg : null;

  return html`
    <div class="root">
      ${view === 'home' && html`<${HomeView} todaysSession=${todaysSession} lastWeight=${latestWeight} onStart=${() => startSession()} onPickDay=${(d) => startSession(d)} onNav=${setView}/>`}
      ${view === 'workout' && currentSession && html`<${WorkoutView} session=${currentSession} lastSession=${lastSessionFor(currentSession.day)} startingWeights=${startingWeights} onSetComplete=${handleSetComplete} onFinish=${finishWorkout} onBack=${() => { setView('home'); setRestActive(false); }}/>`}
      ${view === 'run' && currentSession && html`<${RunView} session=${currentSession} saved=${history.find((s) => s.date === currentSession.date && s.day === currentSession.day)} onSave=${handleRunSave} onBack=${() => setView('home')}/>`}
      ${view === 'body' && html`<${BodyView} weighIns=${weighIns} onAdd=${addWeighIn} onBack=${() => setView('home')}/>`}
      ${view === 'history' && html`<${HistoryView} history=${history} onBack=${() => setView('home')} onOpen=${(s) => { if (s.type === 'lift') { setCurrentSession(s); setView('workout'); } else if (s.type === 'run') { setCurrentSession(s); setView('run'); } }}/>`}
      ${view === 'settings' && html`<${SettingsView} onBack=${() => setView('home')} onReset=${resetAll} dataSize=${history.length} onNav=${setView}/>`}
      ${view === 'starting-weights' && html`<${StartingWeightsView} startingWeights=${startingWeights} onUpdate=${updateStartingWeight} onBack=${() => setView('home')}/>`}
      <${RestTimerOverlay} active=${restActive} remaining=${restRemaining} total=${restTotal} onSkip=${() => setRestActive(false)} onExtend=${(s) => { restEndRef.current += s*1000; setRestTotal(t => t + s); setRestRemaining(r => r + s); }} onCancel=${() => setRestActive(false)}/>
    </div>
  `;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
